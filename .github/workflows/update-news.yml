name: Atualizar notícias

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install feedparser beautifulsoup4 requests googlenewsdecoder

      - name: Buscar notícias
        run: python scripts/fetch_news.py

      - name: Publicar mudanças
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add data/news.json
          git diff --quiet --cached || git commit -m "Atualiza notícias do dia"
          git push
